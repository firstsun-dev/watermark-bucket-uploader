name: CI/CD

permissions:
  contents: write
  issues: write
  pull-requests: write
  attestations: write
  id-token: write

on:
  push:
    branches: [main, master, '**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  CI:
    uses: firstsun-dev/.github/.github/workflows/obsidian-plugin-ci.yml@v1
    with:
      plugin-id: "watermark-bucket-uploader"
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: watermark-bucket-uploader-build
          path: |
            main.js
            manifest.json
            styles.css
          retention-days: 14
