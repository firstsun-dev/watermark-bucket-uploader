name: CI/CD

permissions:
  contents: write
  issues: write
  pull-requests: write
  attestations: write
  id-token: write

on:
  push:
    branches: [main, master, '**']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  CI:
    uses: firstsun-dev/.github/.github/workflows/obsidian-plugin-ci.yml@v1
    with:
      plugin-id: "watermark-bucket-uploader"
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
